name: Build iOS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Sync Capacitor iOS
        run: npx cap sync ios --verbose || (echo '--- cap sync failed, trying copy+update ---' && npx cap copy ios && npx cap update ios)

      - name: Resolve Swift packages
        run: |
          cd ios/App
          xcodebuild -resolvePackageDependencies -project App.xcodeproj -scheme App

      - name: Build iOS (unsigned)
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Create .app archive
        run: |
          APP_PATH=$(find ios/App/build/Build/Products -name "App.app" -type d | head -1)
          zip -r VSF-Global-Cargo-ios-simulator.zip "$APP_PATH"

      - uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: VSF-Global-Cargo-ios-simulator.zip
