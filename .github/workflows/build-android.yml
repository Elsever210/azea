name: Build Android

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install native build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - name: Install dependencies
        run: npm install 2>&1 || true

      - name: Debug — check npm install results
        run: |
          echo "=== node_modules/@capacitor ==="
          ls -la node_modules/@capacitor/ 2>&1 || echo "NO @capacitor"
          echo "=== npx cap --version ==="
          npx cap --version 2>&1 || echo "cap not found"
          echo "=== public/ ==="
          ls public/ | head -10
          echo "=== capacitor.config.json ==="
          cat capacitor.config.json

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Copy web assets to Android
        run: npx cap copy android 2>&1

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
