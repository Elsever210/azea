name: Build Android

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies (skip native modules)
        run: npm install --ignore-scripts

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android SDK platform 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Copy web assets to Android
        run: npx cap copy android

      - name: Build debug APK
        id: gradle-build
        continue-on-error: true
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace 2>&1 | tee /tmp/gradle-output.txt

      - name: Upload build log (on failure)
        if: steps.gradle-build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: /tmp/gradle-output.txt

      - name: Fail if build failed
        if: steps.gradle-build.outcome == 'failure'
        run: exit 1

      - uses: actions/upload-artifact@v4
        if: steps.gradle-build.outcome == 'success'
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
